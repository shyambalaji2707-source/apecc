<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple Chess</title>
<style>
body{
    font-family:Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    background:#222;
    color:white;
}

h1{
    margin:20px;
}

#board{
    display:grid;
    grid-template-columns:repeat(8,80px);
    grid-template-rows:repeat(8,80px);
    border:4px solid #333;
}

.square{
    width:80px;
    height:80px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    cursor:pointer;
}

.white{
    background:#f0d9b5;
}

.black{
    background:#b58863;
}

.selected{
    outline:4px solid yellow;
}

#turn{
    margin:15px;
    font-size:24px;
}
</style>
</head>
<body>

<h1>Chess Game</h1>
<div id="turn">White's Turn</div>
<div id="board"></div>

<script>
const board = document.getElementById("board");
const turnText = document.getElementById("turn");

let turn = "white";
let selected = null;

const pieces = [
["♜","♞","♝","♛","♚","♝","♞","♜"],
["♟","♟","♟","♟","♟","♟","♟","♟"],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["♙","♙","♙","♙","♙","♙","♙","♙"],
["♖","♘","♗","♕","♔","♗","♘","♖"]
];

function pieceColor(piece){
    if("♙♖♘♗♕♔".includes(piece)) return "white";
    if("♟♜♞♝♛♚".includes(piece)) return "black";
    return null;
}

function renderBoard(){
    board.innerHTML = "";

    for(let row=0; row<8; row++){
        for(let col=0; col<8; col++){

            const square = document.createElement("div");
            square.classList.add(
                "square",
                (row+col)%2===0 ? "white":"black"
            );

            square.textContent = pieces[row][col];

            square.onclick = () => handleClick(row,col,square);

            board.appendChild(square);
        }
    }
}

function handleClick(row,col,square){

    const piece = pieces[row][col];

    if(selected===null){

        if(piece && pieceColor(piece)===turn){
            selected={row,col};
            renderBoard();

            const index=row*8+col;
            board.children[index].classList.add("selected");
        }

    }else{

        const fromPiece =
            pieces[selected.row][selected.col];

        pieces[row][col]=fromPiece;
        pieces[selected.row][selected.col]="";

        selected=null;

        turn = turn==="white" ? "black":"white";

        turnText.textContent =
            turn.charAt(0).toUpperCase() +
            turn.slice(1) + "'s Turn";

        renderBoard();
    }
}

renderBoard();
</script>

</body>
</html>
